name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Syntax check
        run: |
          uv run python -c "
          import ast, pathlib, sys
          fails = []
          for p in pathlib.Path('.').glob('*.py'):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  fails.append(f'{p}: {e}')
          if fails:
              print('\n'.join(fails))
              sys.exit(1)
          print('all .py syntax OK')
          "

      - name: Smoke test (office_legacy_to_md)
        run: |
          uv run python -c "
          from office_legacy_to_md import main
          r = main(open('sample/xls_extracted.txt').read())
          assert r['success'], r
          assert '## シート 1' in r['markdown']
          print('legacy OK')
          "

      - name: Smoke test (office_modern_to_md)
        run: |
          uv run python -c "
          from office_modern_to_md import main
          r = main('https://example.invalid/x.doc', 'doc')
          assert not r['success']
          assert '旧形式' in r['error']
          print('modern OK')
          "
